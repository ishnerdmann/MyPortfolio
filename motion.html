<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Graphics | Project Detail</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        body { background: #000; overflow-x: hidden; cursor: default !important; }
        .project-hero {
            width: 100%;
            height: 80vh;
            position: relative;
            overflow: hidden;
            background: #0d0d0d;
        }
        .hero-img {
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=90');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
        }
        .hero-info {
            position: absolute;
            bottom: 80px;
            left: 8vw;
            z-index: 10;
        }
        .p-tag {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--secondary-accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }
        .p-main-title {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            color: #fff;
            margin: 0;
            font-weight: 900;
        }
        .project-details-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 10vw;
            padding: 15vh 8vw;
            max-width: 1400px;
            margin: 0 auto;
        }
        .meta-col {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .meta-item span {
            display: block;
            font-size: 0.6rem;
            letter-spacing: 3px;
            opacity: 0.3;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .meta-item p {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 500;
        }
        .desc-col p {
            font-size: 1.3rem;
            line-height: 1.6;
            opacity: 0.8;
            margin-bottom: 40px;
            font-weight: 300;
        }
        .back-nav {
            position: fixed;
            top: 40px;
            left: 60px;
            z-index: 100;
        }
        .back-link {
            text-decoration: none;
            color: #fff;
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 12px 25px;
            border-radius: 100px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }
        .back-link:hover {
            background: #fff;
            color: #000;
        }
        .full-width-img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            margin: 10vh 0;
            opacity: 0.8;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        /* --- MORE WORK SECTION (SYNCED 1:1 FROM BRANDING.HTML) --- */
        .more-work-section {
            background: #000;
            padding: 120px 8vw;
            position: relative;
            z-index: 20;
        }

        .more-work-label {
            font-size: 11px;
            letter-spacing: 4px;
            opacity: 0.4;
            display: block;
            margin-bottom: 48px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
        }

        .more-work-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
        }

        .more-work-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 56px 48px;
            text-decoration: none;
            transition: background 0.4s ease;
            position: relative;
        }

        .more-work-card:hover {
            background: rgba(255,255,255,0.02);
        }

        .mw-cat {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .mw-title {
            font-size: clamp(24px, 2.5vw, 32px);
            font-weight: 500;
            color: #fff;
            opacity: 0.4;
            margin: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .more-work-card:hover .mw-title {
            color: #ff5500; /* MOTION ACCENT */
            opacity: 1;
            transform: translateX(12px);
        }

        #id-preview {
            position: fixed;
            width: 340px;
            height: 210px;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            transform: scale(0.9) translate(-50%, -50%);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #id-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>

    <script>
        const lenis = new Lenis();
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        gsap.from('.p-main-title', { y: 100, opacity: 0, duration: 1.5, ease: 'expo.out', delay: 0.5 });
        gsap.from('.hero-img', { scale: 1.2, duration: 3, ease: 'power2.out' });

        // PREVIEW LOGIC
        // STAGGER REVEAL
        gsap.registerPlugin(ScrollTrigger);
        gsap.from(".more-work-card", {
            opacity: 0, y: 40, duration: 1.2, stagger: 0.15, ease: "expo.out",
            scrollTrigger: { trigger: ".more-work-section", start: "top 80%" }
        });
    </script>
</body>
</html>

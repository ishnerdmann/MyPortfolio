<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illustration | Design Nerd</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;600;900&family=Inter:wght@100..900&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <style>
        body { background: #000; overflow-x: hidden; font-family: 'Inter', sans-serif; cursor: none; }
        
        /* CUSTOM COMET CURSOR */
        #cursor-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9998;
        }
        #cursor {
            position: fixed; width: 10px; height: 10px; background: #fff;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 15px #fff, 0 0 30px #ff6a00;
            transform: translate(-50%, -50%);
            left: 0; top: 0;
        }
        .cat-nav { position: fixed; top: 0; left: 0; width: 100%; padding: 30px 60px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; mix-blend-mode: difference; }
        .back-link { text-decoration: none; color: #fff; font-size: 0.65rem; letter-spacing: 3px; font-weight: 900; opacity: 1; transition: opacity 0.3s; font-family: 'Space Mono', monospace; }
        .back-link:hover { opacity: 0.7; }

        /* --- HERO SECTION --- */
        .hero-full {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        .bg-video-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #000;
        }

        .bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7; /* Adjust opacity for better text readability */
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.5) 100%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            width: 84vw;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px; /* Space between title and label */
        }

        .hero-title {
            font-family: 'Epilogue', sans-serif;
            font-size: 56px;
            font-weight: 900;
            line-height: 1.1;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: #fff;
        }

        @keyframes fluidColor {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .on-process-label {
            font-family: 'Space Mono', monospace;
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            
            /* FLUID COLOR ANIMATION ON LABEL */
            background: linear-gradient(
                90deg, 
                #ff3333, /* RED */
                #33ff33, /* GREEN */
                #ff3333, 
                #33ff33
            );
            background-size: 400% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: fluidColor 6s ease-in-out infinite;
        }
        /* --- DYNAMIC DISCOVERY SECTION (SYNCED 1:1 FROM BRANDING) --- */
        .more-work-section {
            background: #000;
            padding: 120px 8vw;
            position: relative;
            z-index: 20;
        }

        .more-work-label {
            font-size: 11px;
            letter-spacing: 4px;
            opacity: 0.4;
            display: block;
            margin-bottom: 48px;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
        }

        .more-work-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
        }

        .more-work-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 56px 48px;
            text-decoration: none;
            transition: background 0.4s ease;
            position: relative;
        }

        .more-work-card:hover {
            background: rgba(255,255,255,0.02);
        }

        .mw-cat {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .mw-title {
            font-size: clamp(24px, 2.5vw, 32px);
            font-weight: 500;
            color: #fff;
            opacity: 0.4;
            margin: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .more-work-card:hover .mw-title {
            color: #ff33cc; /* ILLUSTRATION ACCENT */
            opacity: 1;
            transform: translateX(12px);
        }

        #id-preview {
            position: fixed;
            width: 340px;
            height: 210px;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            transform: scale(0.9) translate(-50%, -50%);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #id-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <nav class="cat-nav">
        <a href="index.html?skipLoader=true" class="back-link">BACK TO HOME</a>
        <a href="https://your-resume-link.com" target="_blank" class="resume-btn">RESUME ↗</a>
    </nav>

    <canvas id="cursor-canvas"></canvas>
    <div id="cursor"></div>

    <main>
        <section class="hero-full">
            <div class="bg-video-container">
                <video class="bg-video" autoplay muted loop playsinline>
                    <source src="vedio illustration (1).mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title" data-gsap="reveal-hero">DIGITAL ART</h1>
                <span class="on-process-label" data-gsap="reveal-hero">ON PROCESS</span>
            </div>
        </section>

        <!-- EXPLORE MORE PROJECTS SECTION (SYNCED 1:1) -->
        <section class="more-work-section">
            <span class="more-work-label">EXPLORE MORE PROJECTS</span>
            <div class="more-work-grid">
                <a href="branding.html" class="more-work-card" data-preview="branding_assets/culture-bg-hero.png">
                    <span class="mw-cat">BRAND IDENTITY</span>
                    <h3 class="mw-title">Branding <span>↗</span></h3>
                </a>
                <a href="ui-ux.html" class="more-work-card" data-preview="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=800">
                    <span class="mw-cat">INTERFACE DESIGN</span>
                    <h3 class="mw-title">UI/UX Design <span>↗</span></h3>
                </a>
                <a href="weird_projects.html" class="more-work-card" data-preview="weird_project/1.jpg">
                    <span class="mw-cat">SPECIAL EXPERIMENTS</span>
                    <h3 class="mw-title">Weird Projects <span>↗</span></h3>
                </a>
            </div>
        </section>

        <!-- FLOATING PREVIEW CONTAINER -->
        <div id="id-preview">
            <img src="" id="id-preview-img">
        </div>


    </main>

    <script>
        const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smoothWheel: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        gsap.registerPlugin(ScrollTrigger);
        gsap.from('[data-gsap="reveal-hero"]', { y: 100, opacity: 0, duration: 1.5, stagger: 0.2, ease: "expo.out", delay: 0.5 });
        gsap.from('.bg-video', { scale: 1.1, opacity: 0, duration: 2, ease: "power2.out" });
        // PREVIEW LOGIC

        // STAGGER REVEAL
        gsap.from(".more-work-card", {
            opacity: 0, y: 40, duration: 1.2, stagger: 0.15, ease: "expo.out",
            scrollTrigger: { trigger: ".more-work-section", start: "top 80%" }
        });

        // CURSOR LOGIC
        const setupCursor = () => {
            const cursor = document.getElementById('cursor'); const canvas = document.getElementById('cursor-canvas'); const ctx = canvas.getContext('2d');
            if(!cursor || !canvas) return; canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let mx = window.innerWidth/2, my = window.innerHeight/2, history = [];
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
            document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; gsap.to(cursor, { x: mx, y: my, duration: 0.1, ease: "none" }); history.push({ x: mx, y: my, age: 0 }); });
            gsap.ticker.add(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height); if (history.length < 2) return;
                for(let i = 0; i < history.length - 1; i++) {
                    let p1 = history[i], p2 = history[i+1]; p1.age += 1;
                    let alpha = Math.max(0, 1 - (history.length - i) * 0.04), lineWidth = Math.max(0.5, i * 0.5);
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.strokeStyle = `rgba(255, 106, 0, ${alpha})`; ctx.lineWidth = lineWidth; ctx.lineCap = 'round'; ctx.stroke();
                }
                history = history.filter(p => p.age < 20);
            });
        };
        setupCursor();
    </script>
</body>
</html>
